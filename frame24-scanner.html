<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frame24</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: radial-gradient(ellipse at 50% 30%, #1a1210 0%, #0a0605 55%, #050303 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #eee;
    overscroll-behavior: none;
  }
  body::before {
    /* Vinjettering — mörkare kanter, ljusare mitt */
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 38%, transparent 35%, rgba(0,0,0,0.55) 85%, rgba(0,0,0,0.8) 100%);
    pointer-events: none;
    z-index: 3;
  }

  /* Biografgardiner på sidorna */
  .curtain {
    position: fixed;
    top: 0; bottom: 0;
    width: 11vw;
    min-width: 40px;
    max-width: 110px;
    z-index: 0;
    pointer-events: none;
  }
  .curtain.left { left: 0; }
  .curtain.right { right: 0; transform: scaleX(-1); }
  .curtain svg { width: 100%; height: 100%; display: block; }

  #wrap {
    position: relative;
    z-index: 1;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  #logo-wrap {
    margin: 8px 0 52px 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fr-wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 34px;
    letter-spacing: 2px;
    color: #efe9dc;
    display: flex;
    align-items: center;
  }
  .fr-reel {
    position: relative;
    width: 27px;
    height: 37px;
    margin: 0 1px;
  }
  .fr-reel .leg {
    position: absolute;
    top: 0; left: 11.5px;
    width: 4px; height: 35px;
    background: #efe9dc;
    transform-origin: top center;
  }
  .fr-reel .leg.l { transform: rotate(-13deg); }
  .fr-reel .leg.r { transform: rotate(13deg); }
  .fr-reel .hub {
    position: absolute;
    top: 13px; left: 50%;
    transform: translateX(-50%);
    width: 17px; height: 17px;
    border-radius: 50%;
    background: #efe9dc;
  }
  .fr-reel .hub i {
    position: absolute;
    width: 3.8px; height: 3.8px;
    border-radius: 50%;
    background: #14100c;
  }
  .fr-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 5px;
    color: #8a7358;
    text-align: center;
    margin-top: 4px;
  }

  /* Scen runt bioduken: spotlight + ljusstrålar */
  .screen-stage {
    position: relative;
    width: 100%;
    max-width: 620px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .spotlight-cone {
    position: absolute;
    top: -180px;
    left: 50%;
    transform: translateX(-50%);
    width: 480px;
    height: 420px;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,244,214,0.16), rgba(255,244,214,0.05) 45%, transparent 72%);
    filter: blur(4px);
    pointer-events: none;
    z-index: 0;
  }
  .light-rays {
    position: absolute;
    top: -260px;
    left: 50%;
    width: 700px;
    height: 700px;
    transform: translateX(-50%);
    background: repeating-conic-gradient(from -18deg at 50% 0%,
      rgba(255,244,214,0.05) 0deg 2deg,
      transparent 2deg 6deg);
    -webkit-mask-image: radial-gradient(ellipse at 50% 0%, black 0%, transparent 65%);
    mask-image: radial-gradient(ellipse at 50% 0%, black 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* Bioduks-ram: delad känsla för scanner- och spelarytan */
  .cinema-screen {
    box-shadow:
      0 0 0 2px rgba(201,164,76,0.7),
      0 0 70px rgba(255,244,214,0.22),
      0 0 160px rgba(201,164,76,0.12),
      0 40px 90px rgba(0,0,0,0.75);
    border-radius: 14px;
    position: relative;
    z-index: 1;
    transition: box-shadow 0.4s ease;
  }

  /* Scanner view */
  #scan-box {
    width: 100%;
    max-width: 620px;
    aspect-ratio: 1;
    background: linear-gradient(180deg, #f8f5ef 0%, #ece5d6 100%);
    border-radius: 14px;
    border: 2px solid #c9a44c;
    position: relative;
    overflow: hidden;
  }
  #scan-video { width: 100%; height: 100%; object-fit: cover; }
  #scan-frame {
    position: absolute;
    top: 15%; left: 15%; right: 15%; bottom: 15%;
    border: 2px solid #c9a44c;
    border-radius: 12px;
    pointer-events: none;
    box-shadow: 0 0 0 2000px rgba(10,6,5,0.5);
  }
  #scan-hint {
    position: absolute;
    bottom: 22px; left: 5%; right: 5%;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-style: italic;
    letter-spacing: 0.3px;
    color: #efe9dc;
    text-shadow: 0 2px 6px rgba(0,0,0,0.85);
  }

  /* Player view */
  #player-box {
    width: 100%;
    max-width: 900px;
    aspect-ratio: 16/9;
    background: #000;
    border: 1px solid #2a2a2a;
    display: none;
    position: relative;
  }
  #player-box iframe {
    width: 100% !important;
    height: 100% !important;
    position: absolute;
    inset: 0;
  }
  #title-shield {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    background: rgba(10,10,10,0.05);
    -webkit-mask-image: linear-gradient(to bottom, black 65%, transparent 100%);
    mask-image: linear-gradient(to bottom, black 65%, transparent 100%);
    z-index: 6;
    pointer-events: none;
    display: none;
  }
  #audio-overlay {
    position: absolute;
    inset: 0;
    background: #0a0a0a;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  #audio-overlay-icon {
    font-size: 48px;
    color: #c9a44c;
    margin-bottom: 10px;
  }
  #audio-overlay-text {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
  }
  #start-overlay {
    position: absolute;
    inset: 0;
    background: #0a0a0a;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 5;
  }
  #start-icon {
    font-size: 44px;
    color: #c9a44c;
    margin-bottom: 12px;
  }
  #start-text {
    font-size: 13px;
    letter-spacing: 1px;
    color: #0a0a0a;
    background: #c9a44c;
    padding: 9px 20px;
    border-radius: 20px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .switch {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #aaa;
    cursor: pointer;
    user-select: none;
  }
  .switch input { accent-color: #c9a44c; width: 16px; height: 16px; cursor: pointer; }

  button, .btn {
    padding: 11px 22px;
    border-radius: 5px;
    border: 1px solid #c9a44c;
    background: transparent;
    color: #c9a44c;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    font-size: 13px;
    margin-top: 16px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  button:hover, .btn:hover { background: #c9a44c; color: #0a0a0a; }

  #manual-toggle {
    margin-top: 18px;
    font-size: 12px;
    color: #777;
    text-decoration: underline;
    cursor: pointer;
  }
  #manual-box { display:none; margin-top: 14px; text-align: center; }
  #manual-box input {
    width: 260px;
    padding: 9px 12px;
    border-radius: 5px;
    border: 1px solid #333;
    background: #151515;
    color: #eee;
    font-size: 13px;
    margin-bottom: 8px;
  }
  #status {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-style: italic;
    color: #b8a888;
    margin-top: 18px;
    max-width: 340px;
    text-align: center;
    line-height: 1.5;
  }
  @keyframes screenFadeIn {
    from { opacity: 0; transform: scale(0.97) translateY(6px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .screen-stage, #player-box {
    animation: screenFadeIn 0.6s ease-out;
  }
  #title-reveal {
    margin-top: 16px;
    font-size: 17px;
    font-weight: 600;
    color: #c9a44c;
    text-align: center;
  }
</style>
</head>

  <!-- Scanner -->

<canvas id="canvas" style="display:none;"></canvas>

<script>
  let stream = null;
  let scanning = false;
  const video = document.getElementById('scan-video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  function extractId(input) {
    input = input.trim();

    // Försök tolka som fullständig URL först (hanterar querystring-ordning,
    // shorts, mobil-URL:er, extra spårningsparametrar etc.)
    try {
      const url = new URL(input);
      const host = url.hostname.replace(/^www\./, '').replace(/^m\./, '');

      if (host === 'youtu.be') {
        const id = url.pathname.split('/').filter(Boolean)[0];
        if (id && id.length === 11) return id;
      }

      if (host === 'youtube.com' || host === 'music.youtube.com') {
        const vParam = url.searchParams.get('v');
        if (vParam && vParam.length === 11) return vParam;

        const parts = url.pathname.split('/').filter(Boolean);
        // /shorts/ID eller /embed/ID
        if ((parts[0] === 'shorts' || parts[0] === 'embed' || parts[0] === 'live') && parts[1]) {
          return parts[1].slice(0, 11);
        }
      }
    } catch (e) {
      // Inte en giltig URL, fortsätt till regex-fallback nedan
    }

    // Regex-fallback för YouTube-mönster inbäddade i annan text
    const patterns = [
      /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
      /(?:[?&]v=)([a-zA-Z0-9_-]{11})/,
      /(?:embed\/|shorts\/|live\/)([a-zA-Z0-9_-]{11})/
    ];
    for (const p of patterns) {
      const m = input.match(p);
      if (m) return m[1];
    }
    if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
    return null;
  }

  function extractClip(input) {
    input = input.trim();
    const id = extractId(input);
    let start = null, end = null;
    try {
      const url = new URL(input);
      if (url.searchParams.get('start')) start = parseInt(url.searchParams.get('start'), 10);
      if (url.searchParams.get('end')) end = parseInt(url.searchParams.get('end'), 10);
    } catch (e) { /* inte en URL, inga klipp-tider att hämta */ }
    return { id, start, end };
  }

  function isLikelyUrl(input) {
    try {
      const url = new URL(input.trim());
      return url.protocol === 'http:' || url.protocol === 'https:';
    } catch (e) {
      return false;
    }
  }

  async function startCamera() {
    const statusEl = document.getElementById('status');
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'environment',
          width: { ideal: 1280 },
          height: { ideal: 1280 }
        }
      });
      video.srcObject = stream;
      await video.play();
      statusEl.textContent = '';
      scanning = true;
      requestAnimationFrame(tick);
    } catch (err) {
      statusEl.textContent = 'Kunde inte starta kameran (' + err.message + '). Kontrollera att sidan har kamerabehörighet och körs över HTTPS.';
      document.getElementById('retry-btn').style.display = 'inline-block';
    }
  }

  function tick() {
    if (!scanning) return;

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      try {
        if (typeof jsQR !== 'function') {
          document.getElementById('status').textContent = 'QR-läsarbiblioteket laddades inte. Kolla internetanslutningen och ladda om sidan.';
          return;
        }
        // Skanna en nedskalad bild (max 480px på längsta sidan) istället för
        // full kameraupplösning — jsQR behöver inte högupplöst data för att
        // hitta koden, och det gör avläsningen betydligt snabbare.
        const maxDim = 480;
        const scale = Math.min(1, maxDim / Math.max(video.videoWidth, video.videoHeight));
        canvas.width = Math.round(video.videoWidth * scale);
        canvas.height = Math.round(video.videoHeight * scale);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: 'dontInvert'
        });

        if (code && code.data) {
          const clip = extractClip(code.data);
          if (clip.id) {
            handleScan(clip);
            return;
          } else if (isLikelyUrl(code.data)) {
            document.getElementById('status').textContent = 'Kände inte igen som YouTube-länk, öppnar: ' + code.data;
            scanning = false;
            stopCamera();
            window.location.href = code.data;
            return;
          } else {
            document.getElementById('status').textContent = 'Kod hittad men kunde inte tolkas: ' + code.data;
          }
        }
      } catch (e) {
        document.getElementById('status').textContent = 'Fel vid avläsning: ' + e.message;
      }
    }
    requestAnimationFrame(tick);
  }

  function handleScan(clip) {
    scanning = false;
    stopCamera();
    playVideo(clip.id, clip.start, clip.end);
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
  }

  let currentVideoId = null;
  let ytPlayer = null;
  let ytApiReady = false;
  let userStarted = false;
  let shieldShownForCurrentVideo = false;
  let shieldTimer = null;

  function showTitleShield() {
    const shield = document.getElementById('title-shield');
    shield.style.display = 'block';
    if (shieldTimer) clearTimeout(shieldTimer);
    shieldTimer = setTimeout(() => { shield.style.display = 'none'; }, 5000);
  }

  window.onYouTubeIframeAPIReady = function () {
    ytApiReady = true;
  };

  function playVideo(id, start, end) {
    currentVideoId = id;
    userStarted = false;
    shieldShownForCurrentVideo = false;
    document.getElementById('title-shield').style.display = 'none';
    document.getElementById('scan-view').style.display = 'none';
    document.getElementById('player-box').style.display = 'block';
    document.getElementById('title-reveal').textContent = 'Gissa året — vänd sen på kortet för facit';
    document.getElementById('next-btn').style.display = 'inline-block';
    const overlay = document.getElementById('start-overlay');
    overlay.style.background = '#0a0a0a';
    overlay.style.display = 'flex';
    document.getElementById('start-icon').style.display = 'block';
    document.getElementById('start-text').style.display = 'block';
    document.getElementById('start-icon').textContent = '▶';
    document.getElementById('start-text').textContent = 'Tryck för att starta';
    document.getElementById('audio-overlay').style.display = 'none';

    const playerVars = {
      autoplay: 1,
      mute: 1,
      controls: 0,
      modestbranding: 1,
      rel: 0,
      iv_load_policy: 3,
      fs: 0,
      playsinline: 1,
      disablekb: 1
    };
    if (start) playerVars.start = start;
    if (end) playerVars.end = end;

    if (ytPlayer) {
      // Återanvänd samma spelarinstans — snabbare och undviker dubbletter
      const loadOpts = { videoId: id };
      if (start) loadOpts.startSeconds = start;
      if (end) loadOpts.endSeconds = end;
      ytPlayer.loadVideoById(loadOpts);
      ytPlayer.mute();
    } else if (ytApiReady && typeof YT !== 'undefined') {
      ytPlayer = new YT.Player('yt-player', {
        videoId: id,
        playerVars: playerVars,
        events: {
          onStateChange: onPlayerStateChange
        }
      });
    } else {
      // API:et hann inte ladda klart — försök igen om en liten stund
      setTimeout(() => playVideo(id, start, end), 300);
    }
  }

  function maybeShowTitleShield() {
    // Kolla om det faktiskt är RÄTT video som spelar (inte en reklamannons
    // — annonser har ett annat video-ID än det vi bad om). Eftersom
    // YouTube ibland rapporterar "spelar"-status en bråkdel av en sekund
    // innan video-ID:t hunnit uppdateras internt, kollar vi upprepade
    // gånger under en kort period istället för bara en gång.
    if (shieldShownForCurrentVideo) return;
    let attempts = 0;
    const poll = setInterval(() => {
      attempts++;
      try {
        const data = ytPlayer.getVideoData();
        if (data && data.video_id === currentVideoId) {
          shieldShownForCurrentVideo = true;
          showTitleShield();
          clearInterval(poll);
        }
      } catch (e) { /* spelaren inte redo ännu, försök igen */ }
      if (attempts > 90 || shieldShownForCurrentVideo) clearInterval(poll);
    }, 500);
  }

  function onPlayerStateChange(event) {
    // YT.PlayerState: -1 ej startad, 0 avslutad, 1 spelar, 2 pausad, 3 buffrar, 5 köad
    // Så fort videon INTE aktivt spelar (t.ex. direkt efter att en reklamannons
    // tagit slut och spelaren tillfälligt pausar/buffrar) täcker vi skärmen
    // igen så YouTubes egen titel/kontrollpanel aldrig hinner synas.
    if (event.data === YT.PlayerState.PLAYING && userStarted) {
      const overlay = document.getElementById('start-overlay');
      overlay.style.background = 'transparent';
      document.getElementById('start-icon').style.display = 'none';
      document.getElementById('start-text').style.display = 'none';

      // Video-ID:t visade sig opålitligt för att skilja reklam från riktigt
      // innehåll (YouTube rapporterar samma ID under reklamen också). Istället
      // triggar vi blurren vid VARJE ny övergång till "spelar"-status efter
      // tryckningen — det täcker både starten och (om reklam finns) exakt
      // när reklamen slutar och trailern faktiskt börjar.
      showTitleShield();

    } else if (document.getElementById('player-box').style.display === 'block') {
      const overlay = document.getElementById('start-overlay');
      overlay.style.background = '#0a0a0a';
      overlay.style.display = 'flex';
      document.getElementById('start-icon').style.display = 'block';
      document.getElementById('start-text').style.display = 'block';
      document.getElementById('start-icon').textContent = '▶';
      document.getElementById('start-text').textContent = 'Tryck för att starta';
    }
  }

  function startPlayback() {
    if (!ytPlayer) return;
    userStarted = true;
    ytPlayer.unMute();
    ytPlayer.playVideo();
    const overlay = document.getElementById('start-overlay');
    overlay.style.background = 'transparent';
    document.getElementById('start-icon').style.display = 'none';
    document.getElementById('start-text').style.display = 'none';
    // Visa blur-listen direkt vid tryckningen, oavsett om videon har reklam
    // eller inte.
    showTitleShield();
    if (document.getElementById('audioOnlyToggle').checked) {
      document.getElementById('audio-overlay').style.display = 'flex';
    }
  }

  function toggleOverlay() {
    const checked = document.getElementById('audioOnlyToggle').checked;
    document.getElementById('audio-overlay').style.display = checked ? 'flex' : 'none';
  }

  function scanNext() {
    if (ytPlayer) {
      ytPlayer.stopVideo();
    }
    document.getElementById('player-box').style.display = 'none';
    document.getElementById('title-reveal').textContent = '';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('start-overlay').style.display = 'none';
    document.getElementById('audio-overlay').style.display = 'none';
    document.getElementById('title-shield').style.display = 'none';
    currentVideoId = null;
    document.getElementById('scan-view').style.display = 'block';
    document.getElementById('status').textContent = 'Startar kameran...';
    startCamera();
  }

  window.addEventListener('DOMContentLoaded', () => {
    // Auto-load via ?id= for testing without camera
    const params = new URLSearchParams(window.location.search);
    const idParam = params.get('id');
    if (idParam) {
      const start = params.get('start') ? parseInt(params.get('start'), 10) : null;
      const end = params.get('end') ? parseInt(params.get('end'), 10) : null;
      playVideo(extractId(idParam) || idParam, start, end);
    } else {
      startCamera();
    }
  });

  window.addEventListener('beforeunload', stopCamera);
</script>

</body>
</html>
